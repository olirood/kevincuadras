<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --void: #0D0D0D;
  --surface: rgba(245,240,235,0.05);
  --surface-hi: rgba(245,240,235,0.08);
  --glass-border: rgba(245,240,235,0.10);
  --glass-border-hi: rgba(245,240,235,0.20);
  --iris: #B82020;
  --text-primary: #F5F0EB;
  --text-secondary: #9A9390;
  --text-tertiary: rgba(154,147,144,0.55);
}

html, body {
  min-height: 100%;
  background: var(--void);
  color: var(--text-primary);
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 0%, rgba(139,26,26,0.18) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 80% 90%, rgba(184,32,32,0.07) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: .6;
}

.page {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px 48px;
}

/* ── COVER ── */
.cover-wrap {
  width: 100%; max-width: 320px;
  margin-bottom: 20px;
}

.cover-img {
  width: 100%; aspect-ratio: 1/1;
  object-fit: cover; display: block;
  border-radius: 18px;
  box-shadow:
    0 0 0 1px rgba(184,32,32,0.20),
    0 24px 80px rgba(0,0,0,0.60),
    0 8px 32px rgba(139,26,26,0.25);
}

/* ── TITLE BLOCK ── */
.title-block {
  text-align: center;
  margin-bottom: 28px;
  width: 100%; max-width: 320px;
}

.track-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem; letter-spacing: -0.01em;
  line-height: 0.9;
  color: var(--text-primary);
  margin-bottom: 6px;
}

.track-artists {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: -0.01em;
}

.track-artists strong {
  color: var(--text-primary);
  font-weight: 600;
}

.track-genre {
  display: inline-block;
  margin-top: 8px;
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--iris);
  opacity: 0.8;
}

/* ── PLATFORM LINKS ── */
.links-wrap {
  width: 100%; max-width: 320px;
  display: flex; flex-direction: column;
  gap: 8px;
}

.plat-link {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 16px;
  border-radius: 14px;
  background: var(--surface);
  backdrop-filter: blur(20px) saturate(1.6);
  -webkit-backdrop-filter: blur(20px) saturate(1.6);
  border: 1px solid var(--glass-border);
  text-decoration: none;
  color: var(--text-primary);
  transition: all 0.2s ease;
  position: relative; overflow: hidden;
}

.plat-link::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10), transparent);
}

.plat-link:hover {
  background: var(--surface-hi);
  border-color: var(--glass-border-hi);
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.plat-icon {
  width: 36px; height: 36px; flex-shrink: 0;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}

.plat-icon svg { width: 18px; height: 18px; fill: currentColor; }

.plat-link.sp .plat-icon { background: rgba(30,215,96,0.12); color: #1ed760; }
.plat-link.ap .plat-icon { background: rgba(252,60,68,0.12); color: #fc3c44; }
.plat-link.yt .plat-icon { background: rgba(255,0,0,0.12); color: #ff0000; }
.plat-link.am .plat-icon { background: rgba(0,168,225,0.12); color: #00a8e1; }
.plat-link.dz .plat-icon { background: rgba(162,2,139,0.12); color: #a2028b; }
.plat-link.td .plat-icon { background: rgba(0,255,255,0.08); color: #00ffff; }

.plat-name {
  font-size: 0.92rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  flex: 1;
}

.plat-cta {
  font-size: 0.58rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--text-tertiary);
  flex-shrink: 0;
  padding: 4px 10px;
  border-radius: 20px;
  background: rgba(245,240,235,0.06);
  border: 1px solid rgba(245,240,235,0.10);
  white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
  transition: all 0.2s ease;
}

.plat-link:hover .plat-cta {
  background: rgba(245,240,235,0.12);
  color: var(--text-primary);
}

/* ── FOOTER ── */
.footer {
  margin-top: 36px;
  text-align: center;
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  font-weight: 500;
}

.footer a {
  color: var(--text-tertiary);
  text-decoration: none;
}

.footer a:hover { color: var(--text-secondary); }

@media(prefers-reduced-motion: reduce) {
  * { transition: none !important; }
}
</style>
</head>
